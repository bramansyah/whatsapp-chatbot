{% extends "base.html" %}
{% block title %}{{ 'Edit' if product else 'Tambah' }} Produk - SmartBot{% endblock %}

{% block content %}
<div class="topbar">
    <h2><i class="fas fa-box"></i> {{ 'Edit' if product else 'Tambah' }} Produk</h2>
    <a href="{{ url_for('admin_product_list') }}" class="btn btn-sm btn-outline-secondary"><i class="fas fa-arrow-left"></i> Kembali</a>
</div>

<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="form-card">
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">Nama Produk</label>
                    <input type="text" class="form-control" name="name" value="{{ product.name if product else '' }}" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Deskripsi</label>
                    <textarea class="form-control" name="description" rows="4">{{ product.description if product else '' }}</textarea>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Harga (Rp)</label>
                        <input type="number" class="form-control" name="price" value="{{ product.price if product else 0 }}" required step="100">
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Stok</label>
                        <input type="number" class="form-control" name="stock" value="{{ product.stock if product else 0 }}" required>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label">Kategori</label>
                        <input type="text" class="form-control" name="category" value="{{ product.category if product else 'Umum' }}">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Image URL <small class="text-muted">(opsional)</small></label>
                    <input type="url" class="form-control" name="image_url" value="{{ product.image_url if product else '' }}">
                </div>
                <div class="mb-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="is_available" {{ 'checked' if (product and product.is_available) or not product else '' }}>
                        <label class="form-check-label">Tersedia</label>
                    </div>
                </div>
                <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Simpan</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
