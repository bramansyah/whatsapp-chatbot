<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartBot Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff; border-radius: 20px; padding: 50px 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,.3);
        }
        .login-card .brand { text-align: center; margin-bottom: 30px; }
        .login-card .brand i { font-size: 48px; color: #25D366; }
        .login-card .brand h2 { margin: 10px 0 0; color: #1a1a2e; font-weight: 700; }
        .login-card .brand p { color: #888; }
        .form-control {
            border-radius: 10px; padding: 12px 16px;
            border: 2px solid #e0e0e0;
        }
        .form-control:focus { border-color: #25D366; box-shadow: 0 0 0 3px rgba(37,211,102,.15); }
        .btn-login {
            background: #25D366; color: #fff; border: none;
            border-radius: 10px; padding: 12px; font-weight: 600;
            width: 100%; font-size: 16px; transition: .3s;
        }
        .btn-login:hover { background: #128C7E; color: #fff; transform: translateY(-2px); }
        .input-group-text { background: none; border-right: none; border-radius: 10px 0 0 10px; }
        .input-group .form-control { border-left: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand">
            <i class="fab fa-whatsapp"></i>
            <h2>SmartBot</h2>
            <p>Admin Panel Login</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ 'success' if category == 'success' else 'danger' }} alert-sm">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="Username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="Password" required>
                </div>
            </div>
            <button type="submit" class="btn btn-login">
                <i class="fas fa-sign-in-alt"></i> Masuk
            </button>
        </form>
        <p class="text-center mt-3 text-muted" style="font-size:12px">Default: admin / admin123</p>
    </div>
</body>
</html>
